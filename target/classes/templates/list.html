<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pZM2oqLlW1uGgf6Z2+5YfXHNI6M+0C1o+vP4ZL3ROKJcFjkMTq1U+FPhCI2u1tQ1V8z0l+FZtj/hKsPz3rGMJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Danh Sách Sách - Book Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 14px;
        }
        .user-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .logout-btn {
            background: #d32f2f;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .logout-btn:hover {
            background: #b71c1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.3);
        }
        .action-bar {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #4caf50;
        }
        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th {
            background: linear-gradient(135deg, #f5f7fa 0%, #f0f2f5 100%);
            padding: 16px 12px;
            text-align: left;
            border-bottom: 2px solid #e0e0e0;
            font-weight: 600;
            color: #333;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        table td {
            padding: 16px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        table tbody tr {
            transition: all 0.3s ease;
        }
        table tbody tr:hover {
            background: linear-gradient(90deg, #f8f9fa 0%, #ffffff 100%);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }
        .actions a {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 8px;
            padding: 7px 12px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .edit-link {
            background: #2196f3;
            color: white;
        }
        .delete-link {
            background: #d32f2f;
            color: white;
        }
        .edit-link:hover {
            background: #1976d2;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(33, 150, 243, 0.3);
        }
        .delete-link:hover {
            background: #b71c1c;
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(211, 47, 47, 0.3);
        }
        .empty-message {
            text-align: center;
            padding: 60px 40px;
            color: #999;
        }
        .empty-message p {
            font-size: 15px;
            margin-bottom: 20px;
        }
        .empty-message a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .empty-message a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 Danh Sách Sách</h1>
        <div class="user-info">
            <span>Xin chào, <strong sec:authentication="name">User</strong></span>
            <span class="user-badge" sec:authorize="hasRole('ADMIN')">ADMIN</span>
            <span class="user-badge" sec:authorize="hasRole('USER')">USER</span>
            <form th:action="@{/logout}" method="post" style="display: inline; margin: 0;">
                <button type="submit" class="logout-btn">Đăng Xuất</button>
            </form>
        </div>
    </div>

    <div class="action-bar" sec:authorize="hasRole('ADMIN')">
        <a th:href="@{/books/new}" class="add-btn"> Thêm Sách Mới</a>
    </div>

    <div th:if="${#lists.size(books) > 0}">
        <table border="1" cellspacing="0" cellpadding="5">
            <thead>
            <tr>
                <th style="width: 80px;">Ảnh</th>
                <th>Tiêu Đề</th>
                <th>Tác Giả</th>
                <th>Giá</th>
                <th sec:authorize="hasRole('ADMIN')">Hành Động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td style="text-align: center;">
                    <div th:if="${book.imageData != null and book.imageData != ''}" style="width: 70px; height: 100px; overflow: hidden; border-radius: 5px;">
                        <img th:src="${book.imageData}" alt="" style="width: 100%; height: 100%; object-fit: cover;" />
                    </div>
                    <div th:if="${book.imageData == null or book.imageData == ''}" style="width: 70px; height: 100px; background: #e0e0e0; display: flex; align-items: center; justify-content: center; border-radius: 5px;">
                        <i class="fas fa-image" style="color: #999; font-size: 24px;"></i>
                    </div>
                </td>
                <td th:text="${book.title}">Title</td>
                <td th:text="${book.author}">Author</td>
                <td th:text="${#numbers.formatCurrency(book.price)}">0.0</td>
                <td sec:authorize="hasRole('ADMIN')" class="actions">
                    <a th:href="@{/books/edit/{id}(id=${book.id})}" class="edit-link"><i class="fas fa-edit"></i> Sửa</a>
                    <a th:href="@{/books/delete/{id}(id=${book.id})}" class="delete-link"
                       onclick="return confirm('Bạn chắc chắn muốn xóa?');"><i class="fas fa-trash"></i> Xóa</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div th:if="${#lists.isEmpty(books)}" class="empty-message">
        <p>Không có sách nào trong hệ thống. <span sec:authorize="hasRole('ADMIN')">Hãy <a th:href="@{/books/new}">thêm một cuốn sách</a> mới!</span></p>
    </div>
</div>
</body>
</html>
