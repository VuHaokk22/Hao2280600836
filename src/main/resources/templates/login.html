<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pZM2oqLlW1uGgf6Z2+5YfXHNI6M+0C1o+vP4ZL3ROKJcFjkMTq1U+FPhCI2u1tQ1V8z0l+FZtj/hKsPz3rGMJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Đăng Nhập - Book Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            padding: 40px 30px 50px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(5px);
            position: relative;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            margin: 10px 0 5px;
            font-size: 26px;
            color: #333;
        }
        .login-header p {
            font-size: 14px;
            color: #666;
        }
        .form-group.input-icon {
            position: relative;
        }
        .form-group.input-icon i {
            position: absolute;
            top: 36px;
            left: 12px;
            color: #999;
            font-size: 16px;
        }
        .form-group.input-icon input {
            padding-left: 36px;
        }
        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        .error-message {
            color: #d32f2f;
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            background-color: #ffebee;
            border-radius: 4px;
        }
        .success-message {
            color: #388e3c;
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            background-color: #e8f5e9;
            border-radius: 4px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }
        .form-group.remember {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group.remember input[type="checkbox"] {
            margin-right: 8px;
        }
        .form-group.remember .forgot-link {
            font-size: 13px;
            color: #667eea;
            text-decoration: none;
        }
        .form-group.remember .forgot-link:hover {
            text-decoration: underline;
        }
        .info-box {
            background-color: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
        }
        .info-box h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }
        .info-box p {
            color: #666;
            font-size: 13px;
            margin: 5px 0;
        }
        .info-box code {
            background: white;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <i class="fa fa-book fa-2x" style="color:#667eea;"></i>
        <h1>Book Manager</h1>
        <p>Chào mừng trở lại!</p>
    </div>
    
    <div th:if="${error}" class="error-message">
        <strong>Lỗi!</strong> <span th:text="${error}"></span>
    </div>
    
    <div th:if="${message}" class="success-message">
        <strong>Thành công!</strong> <span th:text="${message}"></span>
    </div>
    
    <form th:action="@{/login}" method="post">
        <div class="form-group input-icon">
            <label for="username">Tên đăng nhập</label>
            <i class="fa fa-user"></i>
            <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus />
        </div>
        
        <div class="form-group input-icon">
            <label for="password">Mật khẩu</label>
            <i class="fa fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required />
        </div>
        
        <div class="form-group remember">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember" class="remember-label">Ghi nhớ tôi</label>
            <a href="#" class="forgot-link">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="submit-btn">Đăng Nhập</button>
    </form>
    
    <div class="info-box">
        <h3>Tài khoản Demo:</h3>
        <p><strong>USER:</strong> <code>user</code> / <code>password123</code></p>
        <p><strong>ADMIN:</strong> <code>admin</code> / <code>admin123</code></p>
    </div>
</div>
</body>
</html>
